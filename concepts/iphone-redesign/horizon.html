<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Long Horizon</title><link rel="stylesheet" href="./shared.css"><style>
  :root{--sky:#ddecff;--blue:#2454d8;--mint:#a8f0d0;--orange:#ff7657;--navy:#102b4e;--pale:#f7fbff}
  body{background:var(--sky);color:var(--navy)} .horizon{background:var(--sky);padding-bottom:100px}
  .horizon::before{content:"";position:absolute;inset:0 0 auto;height:365px;background:linear-gradient(150deg,#eaf4ff 0%,#bcd7ff 80%);clip-path:polygon(0 0,100% 0,100% 75%,63% 69%,39% 88%,0 78%)}
  .top{position:relative;z-index:3;padding:12px 22px 0;display:flex;justify-content:space-between;align-items:center}.brand{font-size:12px;font-weight:900;letter-spacing:.26em}.weather{display:flex;gap:7px;align-items:center;font-size:11px;font-weight:700}.weather i{width:18px;height:18px;border:2px solid var(--orange);border-radius:50%;position:relative}.weather i::after{content:"";position:absolute;width:7px;height:2px;background:var(--orange);right:-5px;top:1px;transform:rotate(-35deg)}
  .hero{position:relative;z-index:2;padding:38px 22px 0}.hello{margin:0;color:#4b6591;font-size:13px;font-weight:700}.hero h1{margin:7px 0 5px;font-size:49px;line-height:1;letter-spacing:-.055em;font-weight:850;font-variant-numeric:tabular-nums}.hero-change{display:inline-flex;align-items:center;gap:6px;margin:8px 0 0;padding:7px 10px;border-radius:10px;background:rgba(255,255,255,.52);color:#d84835;font-size:12px;font-weight:850}.updated{margin-left:9px;font-size:9px;color:#607497}
  .landscape{position:relative;margin-top:28px;height:270px;overflow:hidden;touch-action:none;cursor:ew-resize}.sun{position:absolute;width:52px;height:52px;border-radius:50%;background:var(--orange);right:54px;top:12px;box-shadow:0 0 0 14px rgba(255,118,87,.12)}.landscape-copy{position:absolute;z-index:4;left:22px;top:13px}.landscape-copy span{display:block;color:#42618c;font-size:10px;font-weight:800;letter-spacing:.12em}.landscape-copy strong{font-size:21px;line-height:1.8}.terrain{position:absolute;left:-38%;bottom:0;width:180%;height:182px;will-change:transform;transition:transform 460ms cubic-bezier(.22,1,.36,1)}.ridge-back{position:absolute;inset:30px 0 0;background:#70b9d9;clip-path:polygon(0 76%,7% 62%,14% 67%,20% 47%,27% 58%,34% 30%,41% 56%,49% 41%,57% 64%,66% 38%,73% 49%,81% 23%,89% 45%,100% 35%,100% 100%,0 100%)}.ridge-front{position:absolute;inset:70px 0 0;background:var(--blue);clip-path:polygon(0 68%,8% 48%,16% 61%,25% 33%,32% 47%,40% 64%,49% 28%,57% 42%,66% 22%,74% 50%,82% 33%,91% 61%,100% 42%,100% 100%,0 100%)}.cash-peaks{position:absolute;inset:0}.peak{position:absolute;bottom:27px;width:2px;background:var(--mint);height:54px}.peak::before{content:"";position:absolute;top:-6px;left:-5px;width:12px;height:12px;border-radius:50%;background:var(--mint);box-shadow:0 0 0 6px rgba(168,240,208,.23)}.peak::after{content:attr(data-value);position:absolute;bottom:calc(100% + 11px);left:50%;transform:translateX(-50%);white-space:nowrap;color:white;font-size:9px;font-weight:850}.p1{left:28%;height:35px}.p2{left:48%;height:61px}.p3{left:67%;height:48px}.p4{left:84%;height:74px}
  .months{position:absolute;z-index:4;left:20px;right:20px;bottom:10px;display:flex;justify-content:space-between;color:white;font-size:9px;font-weight:800;letter-spacing:.08em}.you-are-here{position:absolute;z-index:5;left:52%;top:53px;bottom:20px;width:1px;background:rgba(16,43,78,.45)}.you-are-here::before{content:"NOW";position:absolute;top:-13px;left:-15px;font-size:8px;font-weight:900;color:var(--navy)}
  .next{position:relative;z-index:6;margin:-1px 14px 0;padding:18px;border-radius:24px;background:var(--pale);box-shadow:0 14px 34px rgba(16,43,78,.13)}.next-head{display:flex;justify-content:space-between;align-items:center}.next-head h2{font-size:18px;margin:0}.next-head span{font-size:10px;font-weight:800;color:var(--blue)}.event{display:grid;grid-template-columns:44px 1fr auto;gap:11px;align-items:center;margin-top:15px;padding-top:13px;border-top:1px solid #d9e5ef}.date{width:44px;height:44px;border-radius:14px;background:var(--mint);display:grid;place-items:center;text-align:center;font-size:9px;font-weight:800;line-height:1.15}.date strong{font-size:16px}.event-copy strong{display:block;font-size:14px}.event-copy small{font-size:10px;color:#6c8096}.event-value{text-align:right;color:var(--blue);font-size:14px;font-weight:850}.event-value small{display:block;color:#8495a6;font-size:9px}
  .signal-row{padding:19px 22px 0;display:flex;justify-content:space-between;align-items:end}.signal-row h2{font-size:18px;margin:0}.signal-row p{font-size:11px;margin:0;color:#607797}.chips{padding:11px 22px;display:flex;gap:8px;overflow:hidden}.chip{flex:0 0 auto;border:0;border-radius:14px;padding:10px 13px;background:rgba(255,255,255,.52);font-size:11px;font-weight:750}.chip strong{color:var(--orange)}
  .tabs{position:fixed;z-index:20;bottom:12px;left:16px;right:16px;height:66px;border-radius:23px;background:rgba(247,251,255,.86);backdrop-filter:blur(20px) saturate(1.3);display:grid;grid-template-columns:repeat(4,1fr);box-shadow:0 12px 30px rgba(16,43,78,.14)}.tabs button{border:0;background:transparent;font-size:9px;font-weight:750;color:#7690a8}.tabs .active{color:var(--blue)}.tabs b{display:block;margin:0 auto 4px;width:20px;height:4px;border-radius:4px;background:currentColor}.home-indicator{color:var(--navy);bottom:4px}
</style></head><body><main class="concept-screen horizon">

</main><script>const land=document.querySelector('#landscape'),terrain=document.querySelector('#terrain');let sx=0,base=0,drag=false;land.addEventListener('pointerdown',e=>{drag=true;sx=e.clientX;land.setPointerCapture(e.pointerId);terrain.style.transition='none'});land.addEventListener('pointermove',e=>{if(!drag)return;terrain.style.transform=`translateX(${Math.max(-110,Math.min(55,base+e.clientX-sx))}px)`});land.addEventListener('pointerup',e=>{drag=false;base=Math.max(-110,Math.min(55,base+e.clientX-sx));terrain.style.transition='transform 460ms cubic-bezier(.22,1,.36,1)';terrain.style.transform=`translateX(${Math.round(base/28)*28}px)`;base=Math.round(base/28)*28});</script></body></html>
