<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    >
    <meta name="theme-color" content="#152849">
    <title>&#27874;&#26222;&#36134;&#26412;</title>
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="app-kicker">Bopup Ledger</p>
          <h1 class="app-title">&#27874;&#26222;&#36134;&#26412;</h1>
        </div>
        <button
          id="privacyButton"
          class="circle-button"
          type="button"
          aria-label="&#38544;&#34255;&#25110;&#26174;&#31034;&#37329;&#39069;"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              class="eye-shell"
              d="M2 12C4.8 7.9 8.2 5.8 12 5.8S19.2 7.9 22 12c-2.8 4.1-6.2 6.2-10 6.2S4.8 16.1 2 12Z"
              fill="none"
              stroke="currentColor"
              stroke-width="1.9"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
            <circle
              class="eye-core"
              cx="12"
              cy="12"
              r="3.15"
              fill="none"
              stroke="currentColor"
              stroke-width="1.9"
            ></circle>
            <path
              class="eye-slash"
              d="M4 20L20 4"
              fill="none"
              stroke="currentColor"
              stroke-width="1.9"
              stroke-linecap="round"
            ></path>
          </svg>
        </button>
      </header>

      <main class="app-pages">
        <div id="assetsPage" class="page-view page-stack" data-page-view="assets">
        <section class="panel">
          <header class="panel-bar panel-bar--spread">
            <div>
              <h2 class="panel-title">&#36164;&#20135;&#24635;&#35272;</h2>
              <p class="panel-note">
                价格、今年股息率、汇率换算与今年预计股息（含已到账与即将到账）
              </p>
            </div>
            <div class="text-actions">
              <button id="exportButton" class="text-button" type="button">
                &#23548;&#20986;&#24555;&#29031;
              </button>
              <button id="importButton" class="text-button" type="button">
                &#23548;&#20837;&#24555;&#29031;
              </button>
            </div>
          </header>
          <div id="summaryGrid" class="summary-grid"></div>
        </section>

        <section class="panel">
          <header class="panel-bar">
            <div>
              <h2 class="panel-title">&#25345;&#20179;&#32467;&#26500;</h2>
              <p class="panel-note">
                &#20844;&#21496;&#21344;&#27604;&#19982;&#26680;&#24515;&#20179; / &#25171;&#24037;&#20179;&#20998;&#24067;
              </p>
            </div>
          </header>
          <div class="chart-shell">
            <div class="chart-layout">
              <div class="legend-wrap">
                <div id="companyLegend" class="legend-list"></div>
                <button
                  id="legendToggle"
                  class="text-button legend-toggle"
                  type="button"
                  hidden
                ></button>
              </div>
            </div>
            <div id="bucketTrack" class="bucket-track"></div>
          </div>
        </section>

        <section class="panel">
          <header class="panel-bar panel-bar--list">
            <div class="list-heading">
              <h2 class="panel-title">&#25345;&#20179;&#21015;&#34920;</h2>
              <p id="marketTimestamp" class="panel-note"></p>
            </div>
            <div class="sort-group">
              <button class="sort-chip" type="button" data-sort-field="marketValueCny"></button>
              <button class="sort-chip" type="button" data-sort-field="effectiveYield"></button>
              <button class="sort-chip" type="button" data-sort-field="netAnnualDividendCny"></button>
            </div>
            <div class="icon-actions">
              <button
                id="refreshButton"
                class="circle-button"
                type="button"
                aria-label="&#21047;&#26032;&#34892;&#24773;"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M18.6 8.4A7.6 7.6 0 1 0 19 15.7"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.9"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></path>
                  <path
                    d="M15.2 5.8H20v4.8"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.9"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></path>
                </svg>
              </button>
              <button
                id="addButton"
                class="circle-button"
                type="button"
                aria-label="&#26032;&#22686;&#25345;&#20179;"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M12 5.2v13.6M5.2 12h13.6"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.9"
                    stroke-linecap="round"
                  ></path>
                </svg>
              </button>
            </div>
          </header>
          <div id="stockList" class="stock-list"></div>
        </section>
        </div>

        <div id="incomeSummaryPage" class="page-view page-stack" data-page-view="income" hidden>
          <section class="panel">
            <header class="panel-bar panel-bar--spread">
              <div>
                <h2 class="panel-title">收益汇总</h2>
                <p class="panel-note">股息收入按实际到账日统计，资金收益按年度净值变化估算。</p>
              </div>
              <div class="income-header-actions">
                <button
                  id="incomeManualButton"
                  class="income-manual-button"
                  type="button"
                  aria-label="历史回填"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                      d="M12 5.2v13.6M5.2 12h13.6"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.9"
                      stroke-linecap="round"
                    ></path>
                  </svg>
                  <span>历史回填</span>
                </button>
                <div id="incomeFilterGroup" class="segmented-control" aria-label="收益汇总筛选">
                  <button class="segment-button" type="button" data-income-filter="all">全部</button>
                  <button class="segment-button" type="button" data-income-filter="core">核心仓</button>
                  <button class="segment-button" type="button" data-income-filter="income">打工仓</button>
                </div>
              </div>
            </header>
            <div id="incomeOverviewGrid" class="income-overview-grid"></div>
            <p id="incomeMethodNote" class="income-method-note"></p>
          </section>

          <section class="panel">
            <header class="panel-bar">
              <div>
                <h2 class="panel-title">历年趋势</h2>
                <p class="panel-note">股息收入、资金收益与合计参考的年度变化。</p>
              </div>
            </header>
            <div id="incomeTrend" class="income-trend"></div>
          </section>

          <section class="panel">
            <header class="panel-bar">
              <div>
                <h2 class="panel-title">年度列表</h2>
                <p class="panel-note">无历史净值时会提示待回填，不参与资金收益计算。</p>
              </div>
            </header>
            <div id="incomeYearList" class="income-year-list"></div>
          </section>

          <section class="panel">
            <header class="panel-bar">
              <div>
                <h2 class="panel-title">北极星指标</h2>
                <p class="panel-note">核心仓股息收入，用来观察股息收入是否持续增长。</p>
              </div>
            </header>
            <div id="incomeNorthStar" class="income-north-star"></div>
          </section>
        </div>

        <div id="dividendCalendarPage" class="page-view page-stack" data-page-view="dividends" hidden>
          <section class="panel">
            <header class="panel-bar panel-bar--spread">
              <div>
                <h2 class="panel-title">股息日历</h2>
                <p id="dividendCalendarYear" class="panel-note"></p>
              </div>
              <div id="dividendFilterGroup" class="segmented-control" aria-label="股息日历筛选">
                <button class="segment-button" type="button" data-dividend-filter="all">全部</button>
                <button class="segment-button" type="button" data-dividend-filter="core">核心仓</button>
                <button class="segment-button" type="button" data-dividend-filter="income">打工仓</button>
              </div>
            </header>
            <div id="dividendMetricGrid" class="dividend-metric-grid"></div>
          </section>

          <section class="panel">
            <header class="panel-bar">
              <div>
                <h2 class="panel-title">按月分布</h2>
                <p class="panel-note">按实际到账月份统计，点按某月查看当月明细。</p>
              </div>
            </header>
            <div id="dividendMonthGrid" class="dividend-month-grid"></div>
          </section>
        </div>
      </main>

      <nav id="bottomNav" class="bottom-nav" aria-label="主导航">
        <button class="bottom-nav-button" type="button" data-page-nav="assets">资产</button>
        <button class="bottom-nav-button" type="button" data-page-nav="income">收益汇总</button>
        <button class="bottom-nav-button" type="button" data-page-nav="dividends">股息日历</button>
      </nav>
    </div>

    <div id="modalRoot"></div>
    <div id="confirmRoot"></div>
    <div id="toastContainer" class="toast-container"></div>
    <input id="importFileInput" type="file" accept="application/json" hidden>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
