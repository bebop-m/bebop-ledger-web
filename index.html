<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    >
    <meta name="theme-color" content="#f7f5ef">
    <title>Bebop Ledger 3.0</title>
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./styles-v3.css">
  </head>
  <body>
    <div class="app-shell">
      <main class="app-pages">
        <div id="homePage" class="page-view page-stack" data-page-view="home">
          <div id="homePullIndicator" class="home-pull-indicator" aria-hidden="true">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M18.6 8.4A7.6 7.6 0 1 0 19 15.7"
                fill="none"
                stroke="currentColor"
                stroke-width="1.9"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></path>
              <path
                d="M15.2 5.8H20v4.8"
                fill="none"
                stroke="currentColor"
                stroke-width="1.9"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></path>
            </svg>
          </div>
          <header class="home-top">
            <span class="home-brand">BEBOP</span>
            <div class="home-top-actions">
              <button id="exportButton" class="summary-action-button summary-action-button--cloud" type="button" aria-label="同步到云端" title="同步到云端"><span class="cloud-sync-icon" aria-hidden="true"><svg class="cloud-sync-base" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 17a3.5 3.5 0 0 0-1.6-6.4h-.5A6.2 6.2 0 0 0 6 9.6 4.4 4.4 0 0 0 6.5 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path></svg><span class="cloud-sync-badge"></span><svg class="cloud-sync-check" viewBox="0 0 12 12" aria-hidden="true"><path d="M2.2 6.4 4.9 9 9.8 3.8" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path></svg></span></button>
              <button id="importButton" class="text-button" type="button" hidden aria-hidden="true" tabindex="-1">导入快照</button>
              <button
                id="privacyButton"
                class="summary-action-button"
                type="button"
                aria-label="隐藏或显示金额"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    class="eye-shell"
                    d="M2 12C4.8 7.9 8.2 5.8 12 5.8S19.2 7.9 22 12c-2.8 4.1-6.2 6.2-10 6.2S4.8 16.1 2 12Z"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.9"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></path>
                  <circle
                    class="eye-core"
                    cx="12"
                    cy="12"
                    r="3.15"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.9"
                  ></circle>
                  <path
                    class="eye-slash"
                    d="M4 20L20 4"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.9"
                    stroke-linecap="round"
                  ></path>
                </svg>
              </button>
            </div>
          </header>

          <section id="homeHero" class="home-hero" aria-label="总资产"></section>
          <section id="homeFocusCard" class="home-metrics" aria-label="今年关键指标"></section>

          <p class="section-label">功能</p>
          <nav id="homeNavList" class="home-nav-list" aria-label="主导航">
            <button class="home-nav-item" type="button" data-page-nav="holdings">
              <span class="home-nav-title">持仓</span>
              <span class="home-nav-side"><span class="home-nav-summary" data-nav-summary="holdings"></span><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.5 5.5 16 12l-6.5 6.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg></span>
            </button>
            <button class="home-nav-item" type="button" data-page-nav="dividends">
              <span class="home-nav-title">股息日历</span>
              <span class="home-nav-side"><span class="home-nav-summary" data-nav-summary="dividends"></span><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.5 5.5 16 12l-6.5 6.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg></span>
            </button>
            <button class="home-nav-item" type="button" data-page-nav="income">
              <span class="home-nav-title">收益明细</span>
              <span class="home-nav-side"><span class="home-nav-summary" data-nav-summary="income"></span><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.5 5.5 16 12l-6.5 6.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg></span>
            </button>
            <button class="home-nav-item" type="button" data-page-nav="fundamentals">
              <span class="home-nav-title">公司基本面</span>
              <span class="home-nav-side"><span class="home-nav-summary" data-nav-summary="fundamentals"></span><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.5 5.5 16 12l-6.5 6.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg></span>
            </button>
            <button class="home-nav-item" type="button" data-page-nav="records">
              <span class="home-nav-title">资金与交易</span>
              <span class="home-nav-side"><span class="home-nav-summary" data-nav-summary="records"></span><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.5 5.5 16 12l-6.5 6.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg></span>
            </button>
          </nav>

          <button id="quickAddButton" class="quick-add-button" type="button">＋ 记一笔</button>
        </div>

        <div id="holdingsPage" class="page-view page-stack" data-page-view="holdings" hidden>
          <header class="top-bar panel-bar--list">
            <button class="back-button" type="button" data-page-back aria-label="返回首页">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14.5 5.5 8 12l6.5 6.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            </button>
            <div class="top-bar-heading">
              <h2 class="top-bar-title">持仓</h2>
              <p id="marketTimestamp" class="panel-note"></p>
            </div>
            <div class="icon-actions">
              <button id="diagnosticsButton" class="diagnostics-button" type="button" aria-label="持仓诊断">诊断</button>
              <button id="sortToggleButton" class="circle-button sort-toggle-button" type="button" aria-label="排序" aria-expanded="false"></button>
              <div class="sort-group">
                <button class="sort-chip" type="button" data-sort-field="marketValueCny"></button>
                <button class="sort-chip" type="button" data-sort-field="effectiveYield"></button>
                <button class="sort-chip" type="button" data-sort-field="netAnnualDividendCny"></button>
              </div>
              <button
                id="refreshButton"
                class="circle-button"
                type="button"
                aria-label="刷新行情"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M18.6 8.4A7.6 7.6 0 1 0 19 15.7"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.9"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></path>
                  <path
                    d="M15.2 5.8H20v4.8"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.9"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></path>
                </svg>
              </button>
              <button
                id="addButton"
                class="circle-button"
                type="button"
                aria-label="新增持仓"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M12 5.2v13.6M5.2 12h13.6"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.9"
                    stroke-linecap="round"
                  ></path>
                </svg>
              </button>
            </div>
          </header>

          <section class="panel">
            <header class="panel-bar">
              <div>
                <h2 class="panel-title">持仓结构</h2>
              </div>
            </header>
            <div id="holdingsReturnBar" class="return-bar" hidden></div>
            <div class="chart-shell">
              <div id="bucketTrack" class="bucket-track"></div>
              <div class="chart-layout">
                <div class="legend-wrap">
                  <div id="companyLegend" class="legend-list"></div>
                  <button
                    id="legendToggle"
                    class="text-button legend-toggle"
                    type="button"
                    hidden
                  ></button>
                </div>
              </div>
            </div>
          </section>

          <div id="stockList" class="stock-list"></div>
        </div>

        <div id="dividendCalendarPage" class="page-view page-stack" data-page-view="dividends" hidden>
          <header class="top-bar">
            <button class="back-button" type="button" data-page-back aria-label="返回首页">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14.5 5.5 8 12l6.5 6.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            </button>
            <div class="top-bar-heading">
              <h2 class="top-bar-title">股息日历</h2>
              <p id="dividendCalendarYear" class="panel-note"></p>
            </div>
          </header>

          <section class="panel">
            <header class="panel-bar panel-bar--spread">
              <div id="dividendFilterGroup" class="segmented-control" aria-label="股息日历筛选">
                <button class="segment-button" type="button" data-dividend-filter="all">全部</button>
                <button class="segment-button" type="button" data-dividend-filter="core">核心仓</button>
                <button class="segment-button" type="button" data-dividend-filter="income">打工仓</button>
              </div>
            </header>
            <div id="dividendMetricGrid" class="dividend-metric-grid"></div>
          </section>

          <section class="panel">
            <header class="panel-bar">
              <div>
                <h2 class="panel-title">按月分布</h2>
                <p class="panel-note">点按某月查看明细。</p>
              </div>
            </header>
            <div id="dividendMonthGrid" class="dividend-month-grid"></div>
          </section>
        </div>

        <div id="incomeSummaryPage" class="page-view page-stack" data-page-view="income" hidden>
          <header class="top-bar">
            <button class="back-button" type="button" data-page-back aria-label="返回首页">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14.5 5.5 8 12l6.5 6.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            </button>
            <div class="top-bar-heading">
              <h2 class="top-bar-title">收益明细</h2>
            </div>
          </header>

          <section class="panel">
            <div id="incomeOverviewGrid" class="income-overview-grid"></div>
            <div class="income-actions-bar">
              <button id="incomeOpeningCashButton" class="income-manual-button" type="button" aria-label="期初现金">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 8h16v10H4zM4 8l3-3h10l3 3M15 13h2" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                <span>期初现金</span>
              </button>
            </div>
          </section>

          <section class="panel">
            <header class="panel-bar">
              <div>
                <h2 class="panel-title">历年趋势</h2>
              </div>
            </header>
            <div id="incomeTrend" class="income-trend"></div>
          </section>

          <section class="panel">
            <header class="panel-bar">
              <div>
                <h2 class="panel-title">年度明细</h2>
              </div>
            </header>
            <div id="incomeYearList" class="income-year-list"></div>
          </section>
        </div>

        <div id="fundamentalsPage" class="page-view page-stack" data-page-view="fundamentals" hidden>
          <header class="top-bar">
            <button class="back-button" type="button" data-page-back aria-label="返回首页">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14.5 5.5 8 12l6.5 6.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            </button>
            <div class="top-bar-heading">
              <h2 class="top-bar-title">公司基本面</h2>
              <p id="fundamentalsNote" class="panel-note"></p>
            </div>
          </header>

          <div id="fundamentalsContent" class="fundamentals-content"></div>
          <div id="reportCalendarPanel"></div>
        </div>

        <div id="recordsPage" class="page-view page-stack" data-page-view="records" hidden>
          <header class="top-bar">
            <button class="back-button" type="button" data-page-back aria-label="返回首页">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14.5 5.5 8 12l6.5 6.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            </button>
            <div class="top-bar-heading">
              <h2 class="top-bar-title">资金与交易</h2>
            </div>
            <div class="icon-actions">
              <button id="incomeCashFlowButton" class="circle-button" type="button" aria-label="出入金">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4.8v14.4M6.6 9.8 12 4.8l5.4 5M6.6 14.2l5.4 5 5.4-5" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"></path></svg>
              </button>
            </div>
          </header>

          <section class="panel">
            <div id="incomeRecordsList" class="income-records"></div>
          </section>
        </div>
      </main>
    </div>

    <nav id="v3Dock" class="v3-dock" aria-label="主要导航">
      <button type="button" data-page-nav="home" aria-label="总览">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 11.2 12 4l8 7.2v8.3H6.8V13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path></svg>
        <span>总览</span>
      </button>
      <button type="button" data-page-nav="holdings" aria-label="持仓">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="7" width="16" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"></rect><path d="M8 7V5.5h8V7M4 12h16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path></svg>
        <span>持仓</span>
      </button>
      <button class="v3-dock-add" type="button" data-v3-action="quick-add" aria-label="记一笔">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path></svg>
      </button>
      <button type="button" data-page-nav="dividends" aria-label="股息">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 6.5h14v13H5zM8 4v5M16 4v5M5 10h14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path><path d="M9 14h2v2H9z" fill="currentColor"></path></svg>
        <span>股息</span>
      </button>
      <button type="button" data-v3-action="more" aria-label="更多页面" aria-expanded="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="6" height="6" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"></rect><rect x="14" y="4" width="6" height="6" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"></rect><rect x="4" y="14" width="6" height="6" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"></rect><rect x="14" y="14" width="6" height="6" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"></rect></svg>
        <span>更多</span>
      </button>
    </nav>

    <div id="v3MoreMenu" class="v3-more-menu" hidden>
      <button type="button" data-page-nav="income"><span class="v3-more-icon is-income">↗</span><span><strong>收益</strong><small>历年表现与年度复盘</small></span></button>
      <button type="button" data-page-nav="fundamentals"><span class="v3-more-icon is-fundamentals">ƒ</span><span><strong>基本面</strong><small>经营质量与财报日历</small></span></button>
      <button type="button" data-page-nav="records"><span class="v3-more-icon is-records">⇄</span><span><strong>资金记录</strong><small>出入金、交易与持仓成本</small></span></button>
    </div>

    <div id="modalRoot"></div>
    <div id="confirmRoot"></div>
    <div id="toastContainer" class="toast-container"></div>
    <input id="importFileInput" type="file" accept="application/json" hidden>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
