name: Update Fundamentals Data

on:
  workflow_dispatch:
  schedule:
    # 每日复核一次：新财报、股本和派息更新后，诊断最迟次日刷新（UTC；CST = UTC+8）。
    - cron: '30 0 * * *'

permissions:
  contents: write

jobs:
  update-fundamentals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Update fundamentals data
        run: python scripts/update_fundamentals.py

      - name: Commit updated data
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data/fundamentals.json
          git diff --staged --quiet || git commit -m "chore: refresh fundamentals data"
          git push
