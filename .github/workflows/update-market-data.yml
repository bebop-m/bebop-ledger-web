name: Update Market Data

on:
  workflow_dispatch:
  schedule:
    # 每天多次抓取，缩短「除息 → 入账」延迟（UTC；CST = UTC+8）。
    - cron: '10 9 * * *'    # 亚洲收盘后（约 17:10 CST）
    - cron: '10 13 * * *'   # 港股尾盘/补抓（约 21:10 CST）
    - cron: '10 1 * * *'    # 美股收盘后（约 09:10 CST）

permissions:
  contents: write
  actions: write

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Update static market data
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python scripts/update_market_data.py

      - name: Commit updated data
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data/market.json
          git diff --staged --quiet || git commit -m "chore: refresh market data"
          git push

      - name: Trigger deploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-pages.yml/dispatches \
            -d '{"ref":"main"}'
