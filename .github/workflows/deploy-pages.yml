name: Deploy static app to Pages

on:
  push:
    branches:
      - main
  # The data-refresh bots commit with the built-in GITHUB_TOKEN, and GitHub blocks
  # token-pushed commits from triggering `push` (and other) workflows. workflow_run
  # is exempt, so it re-publishes Pages after each scheduled data refresh completes.
  # Without this, bot-committed market/fundamentals data never reaches the live site.
  workflow_run:
    workflows:
      - "Update Market Data"
      - "Update Fundamentals Data"
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
