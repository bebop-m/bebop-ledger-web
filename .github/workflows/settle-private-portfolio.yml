name: Settle Private Portfolio

on:
  workflow_dispatch:
  schedule:
    # Run after the public market-data refresh windows (UTC; HKT = UTC+8).
    - cron: '35 1 * * *'
    - cron: '35 9 * * *'
    - cron: '35 13 * * *'

permissions:
  contents: read

jobs:
  settle-private-portfolio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public app
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Settle private portfolio
        env:
          GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          python scripts/settle_private_portfolio.py \
            --github-repo bebop-m/bebop-ledger-private \
            --github-path data/portfolio.json \
            --market data/market.json
