<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>禅意UI · 选择公司抽屉 · 定稿图</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #e6e7e9; }
body {
  font-family: -apple-system, "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  color: #222;
  padding: 36px 32px 56px;
}
.canvas-head { max-width: 860px; margin: 0 auto 28px; }
.canvas-head h1 { font-size: 18px; font-weight: 800; letter-spacing: 1px; }
.canvas-head p { margin-top: 6px; font-size: 12px; color: #777; }
.board { display: flex; gap: 36px; align-items: flex-start; max-width: 860px; margin: 0 auto; overflow-x: auto; padding-bottom: 12px; }
.option { flex: 0 0 390px; }
.option-label { font-size: 13px; font-weight: 800; letter-spacing: .5px; }
.option-label small { font-weight: 600; color: #999; margin-left: 6px; letter-spacing: 1px; }
.option-note { margin: 4px 0 12px; font-size: 11.5px; line-height: 1.6; color: #888; min-height: 68px; }
.phone { width: 390px; border-radius: 24px; overflow: hidden; position: relative; box-shadow: 0 2px 6px rgba(0,0,0,.10), 0 16px 40px rgba(0,0,0,.12); background: #faf8f3; }
.phone {
  --bg: #faf8f3; --ink: #3b362e;
  --muted: #a89d86; --hint: #c2b9a6; --label: #b0a78f;
  --gold: #c19a45; --track: #eae4d4;
  --up: #bf5a42; --down: #6a8b74;
}
.num { font-variant-numeric: tabular-nums; }
.is-up { color: var(--up); }
.is-down { color: var(--down); }
:where(.phone button) { font-family: inherit; border: none; background: none; color: inherit; text-align: inherit; cursor: default; padding: 0; }

.screen { display: flex; flex-direction: column; padding: 28px 26px 34px; background: var(--bg); color: var(--ink); }
.pagebar { display: grid; grid-template-columns: 56px 1fr 56px; align-items: center; }
.pagebar .back { color: var(--muted); }
.pagebar .back svg { width: 18px; height: 18px; }
.pagebar .page-name { text-align: center; font-size: 11px; font-weight: 600; letter-spacing: 5px; color: var(--label); }
.pagebar-note { margin-top: 7px; text-align: center; font-size: 10px; font-weight: 600; color: var(--hint); }
.sec-head { display: flex; justify-content: space-between; align-items: baseline; }
.sec-label { font-size: 10px; font-weight: 600; letter-spacing: 4px; color: var(--label); }
.sec-aside { font-size: 10.5px; font-weight: 600; color: var(--hint); }

/* 顶部九家速览：目录 + 切换器 */
.rank-track { display: flex; gap: 20px; margin-top: 22px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.rank-track::-webkit-scrollbar { display: none; }
.rank-item { flex: none; text-align: center; font-size: 10px; font-weight: 600; color: var(--hint); }
.rank-item strong { display: block; margin-top: 3px; font-size: 12.5px; font-weight: 700; color: var(--muted); font-variant-numeric: tabular-nums; }
.rank-item.is-active { color: var(--muted); }
.rank-item.is-active strong { color: var(--ink); }
.rank-item.is-active::after { content: ""; display: block; width: 4px; height: 4px; border-radius: 50%; background: var(--gold); margin: 4px auto 0; }

/* 公司名 */
.company { margin-top: 24px; text-align: center; }
.company .co-name { font-size: 19px; font-weight: 800; letter-spacing: .5px; }
.company .co-name svg { width: 14px; height: 14px; vertical-align: -2px; margin-left: 5px; color: var(--muted); }
.company .co-sub { margin-top: 6px; font-size: 10.5px; font-weight: 600; color: var(--hint); }

/* 公式主数块 */
.formula { margin-top: 24px; text-align: center; }
.formula .f-label { font-size: 10px; font-weight: 600; letter-spacing: 5px; color: var(--label); }
.formula .f-value { display: block; margin-top: 10px; font-size: 34px; font-weight: 600; letter-spacing: -1px; line-height: 1; }
.formula .f-note { margin-top: 9px; font-size: 10.5px; font-weight: 600; color: var(--muted); }
.f-stack { display: flex; height: 2px; margin: 16px auto 0; width: 250px; }
.f-stack .s-divi { background: var(--gold); }
.f-stack .s-growth { background: #b3a68c; }
.f-stack .s-buyback { background: var(--track); }
.f-rows { margin: 12px auto 0; width: 250px; display: flex; flex-direction: column; gap: 8px; }
.f-rows > div { display: flex; align-items: baseline; gap: 8px; font-size: 11px; font-weight: 600; color: var(--muted); }
.f-rows b { width: 4px; height: 4px; border-radius: 50%; flex: none; align-self: center; }
.f-rows .b-divi { background: var(--gold); }
.f-rows .b-growth { background: #b3a68c; }
.f-rows .b-buyback { background: var(--track); }
.f-rows small { flex: 1; }
.f-rows strong { color: var(--ink); font-weight: 700; }
.f-method { margin-top: 12px; text-align: center; font-size: 9.5px; font-weight: 600; color: var(--hint); line-height: 1.7; }
.f-anchor { margin-top: 14px; text-align: center; font-size: 11px; font-weight: 600; color: var(--muted); }
.f-anchor strong { color: var(--ink); font-weight: 700; }

/* 估值：PE + 股息率分位，统一「贵 ⇄ 便宜」标尺 */
.val { margin-top: 28px; }
.val-rows { margin-top: 14px; display: flex; flex-direction: column; gap: 18px; }
.val-row { display: flex; flex-direction: column; gap: 8px; }
.val-main { display: flex; justify-content: space-between; align-items: baseline; font-size: 12px; font-weight: 600; color: var(--muted); }
.val-main .vv { color: var(--ink); font-weight: 700; font-size: 13px; }
.val-main .vp { font-size: 10.5px; }
.val-main .vp strong { color: var(--gold); font-weight: 700; }
.val-scale { position: relative; height: 2px; background: var(--track); }
.val-scale i { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 7px; height: 7px; border-radius: 50%; background: var(--gold); }
.val-ends { display: flex; justify-content: space-between; font-size: 9px; font-weight: 600; color: var(--hint); }

/* 分红 / EPS 账页 */
.bars-section { margin-top: 28px; }
.bars-head { display: flex; justify-content: space-between; align-items: baseline; }
.bars-head .latest { font-size: 13px; font-weight: 700; }
.bars-head .latest small { font-size: 10px; font-weight: 600; color: var(--muted); margin-left: 6px; }
.bars-head .latest.is-up { color: var(--up); }
.fline { margin-top: 12px; }
.fline svg { width: 100%; height: auto; display: block; }
.fline polyline { fill: none; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }
.fline.gold polyline { stroke: #dcc492; }
.fline.gold circle { fill: #c9a558; }
.fline.inkish polyline { stroke: #cfc4ad; }
.fline.inkish circle { fill: #8a7d69; }
.fline text { font-family: inherit; font-size: 9.5px; font-weight: 700; font-variant-numeric: tabular-nums; fill: #a89d86; }
.fline text.yr { font-weight: 600; fill: #c2b9a6; }
.fline text.is-current { fill: #3b362e; font-size: 10.5px; }
.bar-stats { margin-top: 12px; display: flex; justify-content: center; gap: 30px; font-size: 10.5px; font-weight: 600; color: var(--hint); }
.bar-stats strong { color: var(--muted); font-weight: 700; }

/* 折叠明细 + 财报日历 */
.fold { margin-top: 28px; display: flex; justify-content: space-between; align-items: baseline; }
.fold .arr { font-size: 11px; color: var(--hint); }
.calendar { margin-top: 28px; flex: 1; }
.cal-rows { margin-top: 13px; display: flex; flex-direction: column; gap: 13px; }
.cal-row { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; font-size: 12px; font-weight: 600; color: var(--muted); }
.cal-row strong { color: var(--ink); font-weight: 700; }
.cal-row .tp { font-size: 10.5px; color: var(--hint); }
.cal-row.is-self strong { color: var(--gold); }

/* ── 选择公司抽屉 ── */
.bg-page { position: absolute; inset: 0; padding: 28px 26px; color: var(--ink); }
.bg-page .page-name { display: block; text-align: center; font-size: 11px; font-weight: 600; letter-spacing: 5px; color: var(--label); }
.bg-page .hero-value { display: block; margin-top: 46px; text-align: center; font-size: 34px; font-weight: 600; letter-spacing: -1px; }
.bg-page .line { height: 2px; background: var(--track); margin-top: 40px; }
.mask { position: absolute; inset: 0; background: rgba(59, 54, 46, .28); }
.sheet { position: absolute; left: 0; right: 0; bottom: 0; background: var(--bg); border-radius: 22px 22px 0 0; padding: 14px 26px 28px; color: var(--ink); }
.sheet-handle { width: 32px; height: 3px; border-radius: 2px; background: var(--track); margin: 0 auto; }
.sheet-title { margin-top: 20px; text-align: center; }
.sheet-title .t { font-size: 11px; font-weight: 600; letter-spacing: 5px; color: var(--label); }
.sheet-title .n { margin-top: 7px; font-size: 11px; font-weight: 600; color: var(--muted); }
.picker-group { margin-top: 20px; font-size: 10px; font-weight: 600; letter-spacing: 4px; color: var(--label); }
.picker-rows { margin-top: 12px; display: flex; flex-direction: column; gap: 14px; }
.picker-row { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; font-size: 12px; font-weight: 600; color: var(--muted); }
.picker-row .n strong { color: var(--ink); font-weight: 700; font-size: 13px; }
.picker-row .n small { font-size: 10px; color: var(--hint); margin-left: 6px; }
.picker-row .v { font-weight: 700; color: var(--ink); }
.picker-row .v small { display: block; text-align: right; font-size: 9.5px; color: var(--gold); font-weight: 700; }
.picker-row.is-active .n strong::after { content: ""; display: inline-block; width: 4px; height: 4px; border-radius: 50%; background: var(--gold); margin-left: 7px; vertical-align: 2.5px; }
.sheet-actions { display: flex; justify-content: center; margin-top: 24px; }
.sheet-actions .cancel { font-size: 12px; font-weight: 700; letter-spacing: 2px; color: var(--hint); }
</style>
</head>
<body>
  <div class="canvas-head">
    <h1>禅意UI · 选择公司抽屉 · 定稿图</h1>
    <p>本文件是该界面唯一视觉标准（在浏览器打开即为目标效果）。数据均为示意，落地一律接真实计算链。</p>
  </div>
  <div class="board">
    <section class="option">
      <h2 class="option-label">选择公司 <small>PICKER</small></h2>
      <p class="option-note">点公司名打开（按市值找公司的场景；按质量比公司走顶部速览）。持仓在前按市值，观察 / 已清仓在后；当前选中金点标记。</p>
      <div class="phone" style="height:800px;">
        <div class="bg-page num"><span class="page-name">公司基本面</span><strong class="hero-value">≈ 12.6%/年</strong><div class="line"></div></div>
        <div class="mask"></div>
        <div class="sheet">
          <div class="sheet-handle"></div>
          <div class="sheet-title">
            <span class="t">选择公司</span>
            <p class="n num">9 家</p>
          </div>
          <p class="picker-group">持仓 · 按市值</p>
          <div class="picker-rows num">
            <div class="picker-row is-active"><span class="n"><strong>中国海洋石油</strong><small>0883.HK</small></span><span class="v">¥286,400<small>当前</small></span></div>
            <div class="picker-row"><span class="n"><strong>长江电力</strong><small>600900</small></span><span class="v">¥224,100</span></div>
            <div class="picker-row"><span class="n"><strong>建设银行</strong><small>0939.HK</small></span><span class="v">¥198,300</span></div>
            <div class="picker-row"><span class="n"><strong>中国神华</strong><small>1088.HK</small></span><span class="v">¥152,600</span></div>
          </div>
          <p class="picker-group">观察 / 已清仓</p>
          <div class="picker-rows num">
            <div class="picker-row"><span class="n"><strong>中国石化</strong><small>0386.HK</small></span><span class="v" style="color:var(--hint);">—</span></div>
            <div class="picker-row"><span class="n"><strong>兖矿能源</strong><small>1171.HK</small></span><span class="v" style="color:var(--hint);">—</span></div>
          </div>
          <div class="sheet-actions"><button class="cancel">关 闭</button></div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
